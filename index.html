<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ParseLab — Grammar Parsing Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   PARSELAB — GRAMMAR PARSING ANALYZER
   Dark industrial-tech theme
   ═══════════════════════════════════════════════ */

:root {
  --bg:        #0a0c10;
  --surface:   #10141c;
  --surface2:  #161b26;
  --border:    #1e2840;
  --accent:    #00e5ff;
  --accent2:   #7c3aed;
  --green:     #00ff88;
  --red:       #ff3b5c;
  --yellow:    #ffd93d;
  --orange:    #ff8c42;
  --text:      #c9d1e0;
  --text-dim:  #556075;
  --mono:      'JetBrains Mono', monospace;
  --display:   'Syne', sans-serif;
  --radius:    10px;
  --glow:      0 0 20px rgba(0,229,255,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--display);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

header {
  position: relative; z-index: 10;
  padding: 2.5rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
}
.header-inner { max-width: 1200px; margin: 0 auto; }
.logo {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}
.logo-bracket { color: var(--accent); opacity: 0.6; }
.logo-text    { color: #e2e8f0; }
.logo-text .accent { color: var(--accent); }
.subtitle {
  margin-top: 0.5rem;
  color: var(--text-dim);
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}

main {
  position: relative; z-index: 10;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

.panel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
}
.panel-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.panel-num {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--accent);
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.2);
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  letter-spacing: 0.1em;
}
.panel-header h2, .result-header h2 {
  font-size: 1.1rem;
  font-weight: 700;
  color: #e2e8f0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.form-group { margin-bottom: 1.5rem; }
.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}
.form-group label .hint {
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  color: #3a4560;
  font-size: 0.72rem;
}
textarea, input[type="text"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.85rem;
  padding: 0.8rem 1rem;
  resize: vertical;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
textarea:focus, input[type="text"]:focus {
  border-color: rgba(0,229,255,0.4);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.06);
}
textarea { line-height: 1.6; }

.example-btns {
  display: flex; gap: 0.5rem; margin-bottom: 0.6rem; flex-wrap: wrap;
}
.ex-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.25rem 0.7rem;
  background: rgba(124,58,237,0.15);
  border: 1px solid rgba(124,58,237,0.3);
  color: #a78bfa;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  letter-spacing: 0.04em;
}
.ex-btn:hover {
  background: rgba(124,58,237,0.3);
  border-color: rgba(124,58,237,0.6);
}

.method-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.method-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  padding: 1rem 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.method-card:hover {
  border-color: rgba(0,229,255,0.3);
  background: rgba(0,229,255,0.04);
}
.method-card.active {
  border-color: var(--accent);
  background: rgba(0,229,255,0.07);
  box-shadow: var(--glow);
}
.method-card input[type="radio"] { display: none; }
.method-icon {
  font-size: 1.4rem;
  filter: grayscale(1);
  transition: filter 0.2s;
}
.method-card.active .method-icon { filter: none; }
.method-name {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  text-align: center;
  color: var(--text-dim);
  transition: color 0.2s;
}
.method-card.active .method-name { color: var(--accent); }

.parse-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  padding: 0.9rem 2rem;
  background: linear-gradient(135deg, var(--accent) 0%, #0099bb 100%);
  color: #0a0c10;
  border: none;
  border-radius: var(--radius);
  font-family: var(--display);
  font-size: 0.95rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.parse-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.parse-btn:active { transform: translateY(0); }
.parse-btn.loading { opacity: 0.6; pointer-events: none; }
.btn-arrow { font-size: 1.1rem; }

.verdict {
  padding: 1.2rem 2rem;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-align: center;
  display: none;
}
.verdict.accepted {
  display: block;
  background: rgba(0,255,136,0.1);
  border: 2px solid var(--green);
  color: var(--green);
  box-shadow: 0 0 30px rgba(0,255,136,0.2);
  animation: pulseGreen 1.5s ease-in-out infinite alternate;
}
.verdict.rejected {
  display: block;
  background: rgba(255,59,92,0.1);
  border: 2px solid var(--red);
  color: var(--red);
  box-shadow: 0 0 30px rgba(255,59,92,0.2);
}
@keyframes pulseGreen {
  from { box-shadow: 0 0 20px rgba(0,255,136,0.15); }
  to   { box-shadow: 0 0 40px rgba(0,255,136,0.35); }
}

.reject-reason-box {
  background: rgba(255,59,92,0.05);
  border: 1px solid rgba(255,59,92,0.25);
  border-left: 4px solid var(--red);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.rr-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.75rem;
}
.rr-icon { font-size: 1rem; color: var(--orange); }
.rr-title {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--red);
}
.rr-body {
  font-family: var(--mono);
  font-size: 0.82rem;
  line-height: 1.75;
  color: #ffb3bf;
  white-space: pre-wrap;
  word-break: break-word;
}

.result-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
}
.result-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.section-label {
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin: 1.5rem 0 0.8rem;
}
.section-label:first-of-type { margin-top: 0; }

.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.parse-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.8rem;
}
.parse-table th {
  background: var(--surface2);
  color: var(--accent);
  padding: 0.65rem 1rem;
  text-align: left;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.parse-table td {
  padding: 0.55rem 1rem;
  border-bottom: 1px solid rgba(30,40,64,0.6);
  color: var(--text);
  vertical-align: top;
}
.parse-table tr:last-child td { border-bottom: none; }
.parse-table tr:hover td { background: rgba(255,255,255,0.02); }

.row-accept td { background: rgba(0,255,136,0.07) !important; color: var(--green) !important; }
.row-error  td { background: rgba(255,59,92,0.07)  !important; color: var(--red)   !important; }

.action-cell { color: var(--yellow) !important; font-weight: 600; }
.rel-cell    { color: var(--accent); font-weight: 700; text-align: center; }
.nt-cell     { color: var(--accent); font-weight: 600; }
.has-entry   { color: var(--green); }
.cell-shift  { color: #7ec8f7 !important; font-weight: 600; }
.cell-reduce { color: var(--yellow) !important; font-weight: 600; }
.cell-accept { color: var(--green) !important; font-weight: 700; }

.rules-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.rule-item {
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 0.3rem 0.8rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
}
.rule-idx { color: var(--accent); font-weight: 700; margin-right: 0.5rem; }
.conflict-item {
  border-color: rgba(255,59,92,0.4);
  background: rgba(255,59,92,0.07);
  color: var(--red);
}

.code-block {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  line-height: 1.7;
  color: #c9d1d9;
  overflow-x: auto;
  max-height: 500px;
  overflow-y: auto;
  white-space: pre;
}
.copy-btn {
  margin-top: 0.5rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 0.3rem 0.8rem;
  background: rgba(0,229,255,0.1);
  border: 1px solid rgba(0,229,255,0.3);
  color: var(--accent);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}
.copy-btn:hover { background: rgba(0,229,255,0.2); }

.trace-box {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  max-height: 380px;
  overflow-y: auto;
  line-height: 1.8;
}
.trace-line        { color: var(--text-dim); }
.trace-line.trace-ok   { color: var(--green); }
.trace-line.trace-fail { color: var(--red); }

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}
@media(max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
.col-block h3 {
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
}

.sets-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
@media(max-width: 600px) { .sets-row { grid-template-columns: 1fr; } }
.set-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}
.set-card h3 {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 0.7rem;
}
.set-content { font-family: var(--mono); font-size: 0.8rem; line-height: 1.9; }
.set-content .nt { color: var(--accent); font-weight: 600; }

.earley-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
}
.earley-set {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
}
.earley-k {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.4rem;
  margin-bottom: 0.5rem;
}
.earley-item {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  padding: 0.1rem 0;
}
.earley-item code { color: var(--text); background: transparent; }

/* ═══════════════════════════════════════════════
   GRAMMAR TRANSFORM PIPELINE
   2-step visualizer: LR Elimination → Left Factoring
   ═══════════════════════════════════════════════ */

/* Plain grammar code block — no span injection */
.grammar-plain {
  font-family: var(--mono);
  font-size: 0.82rem;
  line-height: 1.8;
  color: #c9d1d9;
  background: #0d1117;
  padding: 0.85rem 1rem;
  margin: 0;
  white-space: pre;
  overflow-x: auto;
  border: none;
}

/* Pipeline wrapper */
.transform-pipeline {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 1rem;
}

/* Individual step card */
.pipeline-step {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  opacity: 0;
  transform: translateY(8px);
  animation: pipeIn 0.35s ease forwards;
}
@keyframes pipeIn { to { opacity: 1; transform: translateY(0); } }

.pipeline-step-hdr {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 1.1rem;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.pipeline-num {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--accent);
  background: rgba(0,229,255,0.1);
  border: 1px solid rgba(0,229,255,0.2);
  padding: 0.15rem 0.55rem;
  border-radius: 4px;
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.pipeline-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: #e2e8f0;
  flex: 1;
}
.pipeline-badge {
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 700;
  padding: 0.15rem 0.6rem;
  border-radius: 999px;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.badge-done { background: rgba(0,255,136,0.12); color: #00e577; border: 1px solid rgba(0,255,136,0.3); }
.badge-skip { background: rgba(255,211,61,0.12); color: var(--yellow); border: 1px solid rgba(255,211,61,0.3); }

/* Side-by-side diff inside each step */
.pipeline-diff {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: start;
  gap: 0;
}
@media(max-width: 600px) {
  .pipeline-diff { grid-template-columns: 1fr; }
  .pdiff-arrow { display: none; }
}

.pdiff-box { overflow: hidden; }
.pdiff-before { border-right: 1px solid var(--border); }
.pdiff-after  { }

.pdiff-label {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.3rem 1rem;
  font-family: var(--display);
}
.pdiff-before .pdiff-label { background: rgba(255,59,92,0.1);  color: #ff7a8a; border-bottom: 1px solid rgba(255,59,92,0.15); }
.pdiff-after  .pdiff-label { background: rgba(0,255,136,0.08); color: #00e577; border-bottom: 1px solid rgba(0,255,136,0.12); }

.pdiff-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem 0.75rem;
  font-size: 1.1rem;
  color: var(--text-dim);
  align-self: center;
  border-right: 1px solid var(--border);
  border-left: 1px solid var(--border);
  background: var(--surface2);
  height: 100%;
}

/* Final grammar box */
.pipeline-final {
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: var(--radius);
  overflow: hidden;
  opacity: 0;
  transform: translateY(8px);
  animation: pipeIn 0.35s ease forwards;
}
.pipeline-final-hdr {
  display: flex;
  align-items: center;
  padding: 0.65rem 1.1rem;
  background: rgba(0,255,136,0.07);
  border-bottom: 1px solid rgba(0,255,136,0.2);
}
.pipeline-final-hdr .pipeline-title { color: #00e577; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #2a3550; }

footer {
  position: relative; z-index: 10;
  text-align: center;
  padding: 1.5rem;
  border-top: 1px solid var(--border);
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}

#results-area { display: none; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">Parse<span class="accent">Lab</span></span>
      <span class="logo-bracket">]</span>
    </div>
    <div class="subtitle">Grammar Parsing Analyzer &mdash; All Methods</div>
  </div>
</header>

<main>
  <!-- INPUT PANEL -->
  <div class="panel-card">
    <div class="panel-header">
      <span class="panel-num">01</span>
      <h2>Grammar &amp; Input</h2>
    </div>

    <div class="form-group">
      <label>Grammar <span class="hint">— one production per line, use | for alternatives</span></label>
      <div class="example-btns">
        <button class="ex-btn" onclick="loadExample('simple')">Simple Expr</button>
        <button class="ex-btn" onclick="loadExample('arith')">Arithmetic</button>
        <button class="ex-btn" onclick="loadExample('ll1')">LL(1) Friendly</button>
        <button class="ex-btn" onclick="loadExample('ops')">Op Precedence</button>
        <button class="ex-btn" onclick="loadExample('lr')">Left Recursive</button>
        <button class="ex-btn" onclick="loadExample('lf')">Needs Factoring</button>
      </div>
      <textarea id="grammar-input" rows="6" placeholder="E -> E + T | T&#10;T -> T * F | F&#10;F -> ( E ) | id"></textarea>
    </div>

    <div class="form-group">
      <label>Input String <span class="hint">— space-separated tokens</span></label>
      <input type="text" id="string-input" placeholder="id + id * id"/>
    </div>

    <div class="form-group" style="margin-bottom:0">
      <label>Parsing Method</label>
      <div class="method-grid" id="method-grid">
        <label class="method-card active" onclick="selectMethod('shift_reduce',this)">
          <input type="radio" name="method" value="shift_reduce" checked/>
          <span class="method-icon">⚙️</span>
          <span class="method-name">Shift-Reduce</span>
        </label>
        <label class="method-card" onclick="selectMethod('recursive_descent',this)">
          <input type="radio" name="method" value="recursive_descent"/>
          <span class="method-icon">🔁</span>
          <span class="method-name">Recursive Descent</span>
        </label>
        <label class="method-card" onclick="selectMethod('predictive',this)">
          <input type="radio" name="method" value="predictive"/>
          <span class="method-icon">📊</span>
          <span class="method-name">Predictive LL(1)</span>
        </label>
        <label class="method-card" onclick="selectMethod('operator_precedence',this)">
          <input type="radio" name="method" value="operator_precedence"/>
          <span class="method-icon">🔢</span>
          <span class="method-name">Operator Prec.</span>
        </label>
        <label class="method-card" onclick="selectMethod('slr',this)">
          <input type="radio" name="method" value="slr"/>
          <span class="method-icon">🏗️</span>
          <span class="method-name">SLR(1)</span>
        </label>
      </div>
    </div>

    <button class="parse-btn" id="parse-btn" onclick="runParse()">
      <span class="btn-arrow">▶</span> Analyze
    </button>
  </div>

  <!-- RESULTS -->
  <div id="results-area"></div>
</main>

<footer>ParseLab &mdash; Grammar Parsing Analyzer &mdash; All parsing logic runs server-side via Flask</footer>

<script>
// ═══════════════════════════════════════════
// EXAMPLES
// ═══════════════════════════════════════════
const EXAMPLES = {
  simple: { grammar: `E -> E + T | T\nT -> T * F | F\nF -> ( E ) | id`, input: `id + id * id` },
  arith:  { grammar: `S -> S + S | S * S | ( S ) | id`, input: `id + id` },
  ll1:    { grammar: `E -> T E'\nE' -> + T E' | ε\nT -> F T'\nT' -> * F T' | ε\nF -> ( E ) | id`, input: `id + id * id` },
  ops:    { grammar: `E -> E + E | E * E | ( E ) | id`, input: `id + id * id` },
  lr:     { grammar: `E -> E + T | T\nT -> T * F | F\nF -> ( E ) | id`, input: `id + id * id` },
  lf:     { grammar: `S -> a b c | a b d | a e\nB -> b c | b d`, input: `a b c` }
};

function loadExample(key) {
  const ex = EXAMPLES[key];
  document.getElementById('grammar-input').value = ex.grammar;
  document.getElementById('string-input').value = ex.input;
}

let currentMethod = 'shift_reduce';
function selectMethod(val, el) {
  currentMethod = val;
  document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ═══════════════════════════════════════════
// RUN PARSE — calls Flask backend
// ═══════════════════════════════════════════
async function runParse() {
  const grammar = document.getElementById('grammar-input').value.trim();
  const inp = document.getElementById('string-input').value.trim();
  if (!grammar) { alert('Please enter a grammar.'); return; }
  if (!inp)     { alert('Please enter an input string.'); return; }

  const btn = document.getElementById('parse-btn');
  btn.classList.add('loading');
  btn.textContent = 'Analyzing…';

  try {
    const resp = await fetch('/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ method: currentMethod, grammar, input: inp })
    });
    const result = await resp.json();
    renderResults(result, currentMethod);
  } catch(e) {
    renderResults({ error: `Network error: ${e.message}` }, currentMethod);
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="btn-arrow">▶</span> Analyze';
  }
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════
// TRANSFORM VISUALIZATION
// Shows exactly 2 steps: LR Elimination → Left Factoring
// then the final grammar. Plain text only — no HTML spans.
// ═══════════════════════════════════════════

function grammarBox(text) {
  // Plain escaped text inside a styled <pre> — no span injection
  return `<pre class="grammar-plain">${esc(text)}</pre>`;
}

function buildTransformViz(data) {
  if (!data.lr_steps && !data.lf_steps) return '';

  // Extract the "after LR elimination" grammar from lr_steps result step
  const lrResultStep = (data.lr_steps || []).find(s => s.phase === 'result' || s.phase === 'no_change');
  const lfResultStep = (data.lf_steps || []).find(s => s.phase === 'result' || s.phase === 'no_change');

  const afterLR = lrResultStep ? lrResultStep.grammar : data.original_grammar;
  const afterLF = lfResultStep ? lfResultStep.grammar : afterLR;

  const lrNoChange = (data.lr_steps || []).some(s => s.phase === 'no_change');
  const lfNoChange = (data.lf_steps || []).some(s => s.phase === 'no_change');

  let html = `<div class="section-label" style="margin-top:1.5rem">✦ Grammar Transformations</div>
  <div class="transform-pipeline">`;

  // ── STEP 1: Left Recursion Elimination ──────────────────────────
  html += `
  <div class="pipeline-step" style="animation-delay:0s">
    <div class="pipeline-step-hdr">
      <span class="pipeline-num">Step 1</span>
      <span class="pipeline-title">✂️ Left Recursion Elimination</span>
      ${lrNoChange ? `<span class="pipeline-badge badge-skip">Not needed</span>` : `<span class="pipeline-badge badge-done">Applied</span>`}
    </div>
    <div class="pipeline-diff">
      <div class="pdiff-box pdiff-before">
        <div class="pdiff-label">Input</div>
        ${grammarBox(data.original_grammar || '')}
      </div>
      <div class="pdiff-arrow">→</div>
      <div class="pdiff-box pdiff-after">
        <div class="pdiff-label">Output</div>
        ${grammarBox(afterLR || '')}
      </div>
    </div>
  </div>`;

  // ── STEP 2: Left Factoring ───────────────────────────────────────
  html += `
  <div class="pipeline-step" style="animation-delay:0.12s">
    <div class="pipeline-step-hdr">
      <span class="pipeline-num">Step 2</span>
      <span class="pipeline-title">🔧 Left Factoring</span>
      ${lfNoChange ? `<span class="pipeline-badge badge-skip">Not needed</span>` : `<span class="pipeline-badge badge-done">Applied</span>`}
    </div>
    <div class="pipeline-diff">
      <div class="pdiff-box pdiff-before">
        <div class="pdiff-label">Input</div>
        ${grammarBox(afterLR || '')}
      </div>
      <div class="pdiff-arrow">→</div>
      <div class="pdiff-box pdiff-after">
        <div class="pdiff-label">Output</div>
        ${grammarBox(afterLF || '')}
      </div>
    </div>
  </div>`;

  // ── FINAL GRAMMAR ────────────────────────────────────────────────
  html += `
  <div class="pipeline-final" style="animation-delay:0.24s">
    <div class="pipeline-final-hdr">
      <span class="pipeline-title">✅ Final Grammar — used for LL(1) Parsing</span>
    </div>
    ${grammarBox(data.transformed_grammar || '')}
  </div>`;

  html += `</div>`; // .transform-pipeline
  return html;
}

// ═══════════════════════════════════════════
// VERDICT + REASON
// ═══════════════════════════════════════════
function renderVerdictAndReason(accepted, rejectReason, error) {
  let html = '';
  if (accepted) {
    html += `<div class="verdict accepted">✅ INPUT ACCEPTED</div>`;
  } else {
    html += `<div class="verdict rejected">❌ INPUT REJECTED</div>`;
    const reason = rejectReason || error || 'Unknown error.';
    html += `<div class="reject-reason-box" style="margin-top:1rem"><div class="rr-header"><span class="rr-icon">⚠</span><span class="rr-title">Why was it rejected?</span></div><div class="rr-body">${esc(reason)}</div></div>`;
  }
  return html;
}

// ═══════════════════════════════════════════
// STEPS TABLE
// ═══════════════════════════════════════════
function renderStepsTable(steps, columns) {
  let html = `<div class="table-wrap"><table class="parse-table"><thead><tr>`;
  for (const c of columns) html += `<th>${esc(c.label)}</th>`;
  html += `</tr></thead><tbody>`;
  for (const s of steps) {
    const txt = s.action || s.output || '';
    const isAccept = txt.includes('ACCEPT');
    const isError  = txt.startsWith('ERROR');
    html += `<tr class="${isAccept?'row-accept':isError?'row-error':''}">`;
    for (const c of columns) {
      const val = c.key === 'stack' || c.key === 'sym_stack' || c.key === 'state_stack'
        ? `[ ${(s[c.key]||[]).join(' ')} ]`
        : c.key === 'input' ? (s[c.key]||[]).join(' ')
        : s[c.key] || '';
      html += `<td class="${c.cls||''}">${esc(val)}</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}

// ═══════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════
function renderResults(result, method) {
  const area = document.getElementById('results-area');
  area.style.display = 'block';

  if (result.error && !result.steps) {
    area.innerHTML = `<div class="result-block">
      <div class="reject-reason-box">
        <div class="rr-header"><span class="rr-icon">⚠</span><span class="rr-title">Error</span></div>
        <div class="rr-body">${esc(result.error)}</div>
      </div>
      ${result.reject_reason ? `<div class="reject-reason-box" style="margin-top:1rem">
        <div class="rr-header"><span class="rr-icon">⚠</span><span class="rr-title">Details</span></div>
        <div class="rr-body">${esc(result.reject_reason)}</div>
      </div>` : ''}
    </div>`;
    area.scrollIntoView({ behavior: 'smooth' });
    return;
  }

  let html = `<div class="result-block">
    <div class="result-header">
      <span class="panel-num">${methodLabel(method)}</span>
      <h2>Parse Results</h2>
    </div>`;

  html += renderVerdictAndReason(result.accepted, result.reject_reason, result.error);

  // ── SHIFT-REDUCE ────────────────────────────────────────────────
  if (method === 'shift_reduce' && result.steps) {
    html += `<div class="section-label" style="margin-top:1.5rem">Parse Steps</div>`;
    html += renderStepsTable(result.steps, [
      { key: 'stack',  label: 'Stack' },
      { key: 'input',  label: 'Input' },
      { key: 'action', label: 'Action', cls: 'action-cell' }
    ]);
  }

  // ── RECURSIVE DESCENT ───────────────────────────────────────────
  if (method === 'recursive_descent') {
    if (result.trace) {
      html += `<div class="section-label" style="margin-top:1.5rem">Derivation Trace</div>
        <div class="trace-box">`;
      for (const line of result.trace) {
        const cls = line.includes('✓') ? 'trace-ok' : line.includes('✗') ? 'trace-fail' : '';
        html += `<div class="trace-line ${cls}">${esc(line)}</div>`;
      }
      html += `</div>`;
    }
    if (result.c_program) {
      html += `<div class="section-label" style="margin-top:1.5rem">Generated C Parser</div>
        <div class="code-block" id="c-code">${esc(result.c_program)}</div>
        <button class="copy-btn" onclick="copyCode()">Copy C Code</button>`;
    }
  }

  // ── PREDICTIVE LL(1) ────────────────────────────────────────────
  if (method === 'predictive') {

    // ▸ GRAMMAR TRANSFORMATIONS  ← NEW SECTION
    html += buildTransformViz(result);

    // FIRST / FOLLOW
    if (result.first) {
      html += `<div class="section-label" style="margin-top:1.5rem">FIRST &amp; FOLLOW Sets</div>
        <div class="sets-row">
          <div class="set-card"><h3>FIRST Sets</h3><div class="set-content">`;
      for (const [k, v] of Object.entries(result.first))
        html += `<div><span class="nt">${esc(k)}</span> → { ${v.map(esc).join(', ')} }</div>`;
      html += `</div></div>
          <div class="set-card"><h3>FOLLOW Sets</h3><div class="set-content">`;
      for (const [k, v] of Object.entries(result.follow))
        html += `<div><span class="nt">${esc(k)}</span> → { ${v.map(esc).join(', ')} }</div>`;
      html += `</div></div></div>`;
    }

    // Parsing Table
    if (result.table) {
      html += `<div class="section-label">Parsing Table M[NT, Terminal]</div>
        <div class="table-wrap"><table class="parse-table"><thead><tr><th>NT</th>`;
      for (const t of result.terminals) html += `<th>${esc(t)}</th>`;
      html += `</tr></thead><tbody>`;
      for (const row of result.table) {
        html += `<tr><td class="nt-cell">${esc(row.NT)}</td>`;
        for (const t of result.terminals) {
          const v = row[t] || '';
          html += `<td class="${v ? 'has-entry' : ''}">${esc(v)}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
    }

    // Parse Steps
    if (result.steps) {
      html += `<div class="section-label" style="margin-top:1.5rem">Parse Steps</div>`;
      html += renderStepsTable(result.steps, [
        { key: 'stack',  label: 'Stack' },
        { key: 'input',  label: 'Input' },
        { key: 'output', label: 'Output', cls: 'action-cell' }
      ]);
    }
  }

  // ── OPERATOR PRECEDENCE ─────────────────────────────────────────
  if (method === 'operator_precedence' && result.steps) {
    html += `<div class="section-label" style="margin-top:1.5rem">Parse Steps</div>
      <div class="table-wrap"><table class="parse-table"><thead>
        <tr><th>Stack</th><th>Input</th><th class="rel-cell">Rel</th><th>Action</th></tr>
      </thead><tbody>`;
    for (const s of result.steps) {
      const isAccept = (s.action||'').includes('ACCEPT');
      const isError  = (s.action||'').startsWith('ERROR');
      html += `<tr class="${isAccept?'row-accept':isError?'row-error':''}">
        <td>${esc('[ ' + (s.stack||[]).join(' ') + ' ]')}</td>
        <td>${esc((s.input||[]).join(' '))}</td>
        <td class="rel-cell">${esc(s.relation||'')}</td>
        <td class="action-cell">${esc(s.action||'')}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // ── SLR(1) ──────────────────────────────────────────────────────
  if (method === 'slr') {
    if (result.rules) {
      html += `<div class="section-label" style="margin-top:1.5rem">Grammar Rules</div>
        <div class="rules-list">`;
      for (let i = 0; i < result.rules.length; i++)
        html += `<div class="rule-item"><span class="rule-idx">r${i}</span>${esc(result.rules[i])}</div>`;
      html += `</div>`;
    }
    if (result.state_items) {
      html += `<div class="section-label">LR(0) States</div><div class="earley-grid">`;
      for (const st of result.state_items) {
        html += `<div class="earley-set"><div class="earley-k">STATE ${st.state}</div>`;
        for (const item of st.items)
          html += `<div class="earley-item"><code>${esc(item)}</code></div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }
    if (result.action_table) {
      html += `<div class="section-label" style="margin-top:1.5rem">ACTION Table</div>
        <div class="table-wrap"><table class="parse-table"><thead>
          <tr><th>State</th>`;
      for (const t of result.terminals) html += `<th>${esc(t)}</th>`;
      html += `</tr></thead><tbody>`;
      for (const row of result.action_table) {
        html += `<tr><td class="nt-cell">${row.state}</td>`;
        for (const t of result.terminals) {
          const v = row[t] || '';
          const cls = v.startsWith('s') ? 'cell-shift' : v.startsWith('r') ? 'cell-reduce' : v === 'acc' ? 'cell-accept' : '';
          html += `<td class="${cls}">${esc(v)}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
    }
    if (result.goto_table && result.nonterminals?.length) {
      html += `<div class="section-label" style="margin-top:1rem">GOTO Table</div>
        <div class="table-wrap"><table class="parse-table"><thead>
          <tr><th>State</th>`;
      for (const nt of result.nonterminals) html += `<th>${esc(nt)}</th>`;
      html += `</tr></thead><tbody>`;
      for (const row of result.goto_table) {
        html += `<tr><td class="nt-cell">${row.state}</td>`;
        for (const nt of result.nonterminals) {
          const v = row[nt] !== undefined && row[nt] !== '' ? row[nt] : '';
          html += `<td class="${v !== '' ? 'cell-shift' : ''}">${esc(v)}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
    }
    if (result.steps) {
      html += `<div class="section-label" style="margin-top:1.5rem">Parse Simulation</div>`;
      html += renderStepsTable(result.steps, [
        { key: 'state_stack', label: 'State Stack' },
        { key: 'sym_stack',   label: 'Symbol Stack' },
        { key: 'input',       label: 'Input' },
        { key: 'action',      label: 'Action', cls: 'action-cell' }
      ]);
    }
  }

  html += `</div>`;
  area.innerHTML = html;
  area.scrollIntoView({ behavior: 'smooth' });
}

function methodLabel(m) {
  return { shift_reduce:'SR', recursive_descent:'RD', predictive:'LL1', operator_precedence:'OP', slr:'SLR' }[m] || m.toUpperCase();
}
function copyCode() {
  const el = document.getElementById('c-code');
  if (el) navigator.clipboard.writeText(el.innerText);
}

// Load default example
loadExample('simple');
</script>
</body>
</html>
